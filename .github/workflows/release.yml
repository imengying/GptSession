name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  image:
    name: Publish image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

  binaries:
    name: Publish binaries
    needs: image
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/amd64 dist/arm64 release
          docker buildx build \
            --platform linux/amd64 \
            --target binary \
            --output type=local,dest=dist/amd64 \
            --cache-from type=gha,scope=release \
            .
          docker buildx build \
            --platform linux/arm64 \
            --target binary \
            --output type=local,dest=dist/arm64 \
            --cache-from type=gha,scope=release \
            .
          tar -C dist/amd64 -czf release/session-bridge-linux-amd64.tar.gz session-bridge
          tar -C dist/arm64 -czf release/session-bridge-linux-arm64.tar.gz session-bridge
          cd release
          sha256sum session-bridge-linux-*.tar.gz > SHA256SUMS

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/session-bridge-linux-amd64.tar.gz
            release/session-bridge-linux-arm64.tar.gz
            release/SHA256SUMS
