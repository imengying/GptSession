name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish image and binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release

      - name: Extract release binaries
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist/amd64 dist/arm64 release

          docker pull --platform linux/amd64 "$IMAGE:$TAG"
          amd64_container=$(docker create --platform linux/amd64 "$IMAGE:$TAG")
          docker cp "$amd64_container:/usr/local/bin/session-bridge" dist/amd64/session-bridge
          docker rm "$amd64_container"

          docker pull --platform linux/arm64 "$IMAGE:$TAG"
          arm64_container=$(docker create --platform linux/arm64 "$IMAGE:$TAG")
          docker cp "$arm64_container:/usr/local/bin/session-bridge" dist/arm64/session-bridge
          docker rm "$arm64_container"

          tar -C dist/amd64 -czf release/session-bridge-linux-amd64.tar.gz session-bridge
          tar -C dist/arm64 -czf release/session-bridge-linux-arm64.tar.gz session-bridge
          cd release
          sha256sum session-bridge-linux-*.tar.gz > SHA256SUMS

      - name: Upload GitHub Release assets
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/session-bridge-linux-amd64.tar.gz
            release/session-bridge-linux-arm64.tar.gz
            release/SHA256SUMS
